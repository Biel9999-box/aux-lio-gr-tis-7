<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFA.IA V7 - ULTIMATE FIX</title>
    <style>
        :root { 
            --bg: #050507; 
            --card: #0d0d12;
            --primary: #8a2be2; 
            --text: #ffffff;
            --card-border: rgba(138, 43, 226, 0.4);
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* TELA DE LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        .login-card { width: 85%; max-width: 350px; text-align: center; padding: 35px; border-radius: 25px; background: #0d0d12; border: 1px solid var(--card-border); }
        .login-title { font-size: 28px; font-weight: 900; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px var(--primary); }
        .input-login { width: 100%; padding: 15px; background: #161621; border: 1px solid #222; border-radius: 12px; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .hide-login { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        /* PAINEL PRINCIPAL */
        .container { width: 100%; max-width: 410px; margin: auto; padding: 15px; box-sizing: border-box; display: none; }
        .show-panel { display: block; }
        .header { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
        .header-title { font-size: 28px; font-weight: 900; color: var(--primary); text-shadow: 0 0 25px rgba(138, 43, 226, 0.7); }
        
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: #13131c; border-radius: 12px; font-size: 10px; font-weight: 800; color: #444; cursor: pointer; text-align: center; }
        .tab.active { background: var(--primary); color: white; }

        /* ÁREA DO CHAT */
        .chat-area { height: 440px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding: 12px; background: rgba(15, 15, 25, 0.9); border-radius: 18px; border: 1px solid #1a1a24; margin-bottom: 15px; }
        .bubble { padding: 15px; border-radius: 20px; font-size: 13px; max-width: 90%; line-height: 1.6; white-space: pre-wrap; }
        .bot { background: #161621; border-left: 5px solid var(--primary); align-self: flex-start; color: #eee; }
        .user { background: var(--primary); align-self: flex-end; font-weight: bold; }

        .input-group { display: flex; gap: 10px; background: #13131c; padding: 10px; border-radius: 20px; border: 1px solid #222; }
        .input-group input { flex: 1; background: transparent; border: none; color: white; outline: none; padding-left: 10px; }
        .send-btn { background: var(--primary); border: none; border-radius: 15px; width: 55px; color: white; cursor: pointer; }

        .main-btn { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 15px; color: white; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; cursor: pointer; font-size: 12px; }
        .ff-btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #ff4500, #ff8c00); border: none; border-radius: 15px; color: white; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="login-title">ALFA.IA ⚡</div>
        <p style="font-size:10px; color:#555; margin-bottom: 20px;">V7.0 ULTIMATE - BY LEWI PROJECT</p>
        <input type="text" id="loginKey" class="input-login" placeholder="DIGITE A KEY">
        <button class="btn-login" onclick="attemptLogin()">ACESSAR SISTEMA</button>
        <div id="loginStatus" style="font-size:11px; margin-top:15px; color:#ff0055; font-weight:bold;"></div>
    </div>
</div>

<div class="container" id="main-panel">
    <div class="header">
        <div class="header-title">ALFA.IA V7 ⚡</div>
        <div style="font-size: 10px; color: #666; font-weight: 800;">PRODUCED BY ALFA CHEATS 👑</div>
    </div>
    
    <div class="nav-tabs">
        <div class="tab active" onclick="showTab('bot')">🤖 IA SYSTEM</div>
        <div class="tab" onclick="showTab('tool')">🛠️ AUXÍLIO</div>
        <div class="tab" onclick="showTab('fps')">🚀 BOOST</div>
    </div>

    <div id="tab-bot">
        <div class="chat-area" id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Aguarde... 🔒" disabled>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
        </div>
    </div>

    <div id="tab-tool" class="hidden">
        <button class="main-btn" onclick="execute(this, 'NO RECOIL: ATIVO (REGEDIT) 🛠️')">ATIVAR NO RECOIL (FIXED)</button>
        <button class="main-btn" onclick="execute(this, 'HS PESCOÇO: 100% CRÂNIO 💀')">ATIVAR HS PESCOÇO (LOCK)</button>
        <button class="main-btn" onclick="execute(this, 'AIMBOT/FOV INJETADO! 🎯')">INJETAR AUXÍLIO GERAL</button>
        <button class="ff-btn" onclick="openFF()">🔫 ABRIR FREE FIRE</button>
    </div>

    <div id="tab-fps" class="hidden">
        <button class="main-btn" onclick="execute(this, 'SISTEMA OTIMIZADO! 🚀')">BOOST HARDWARE</button>
        <button class="ff-btn" onclick="openFF()">🔥 INSTANT START FF</button>
    </div>
</div>

<script>
    function openFF() {
        window.location.href = "freefire://";
        setTimeout(function() {
            window.location.href = "intent://#Intent;package=com.dts.freefireth;scheme=freefire;end";
        }, 800);
    }

    function attemptLogin() {
        const keyVal = document.getElementById('loginKey').value.trim().toLowerCase();
        if(keyVal === "alfa") {
            document.getElementById('login-screen').classList.add('hide-login');
            document.getElementById('main-panel').classList.add('show-panel');
            startBot();
        } else {
            document.getElementById('loginStatus').innerText = "KEY INVÁLIDA! 🛑";
        }
    }

    const chat = document.getElementById('chat-box');
    const input = document.getElementById('userInput');
    const btnSend = document.getElementById('sendBtn');

    function startBot() {
        const manifesto = `[ULTIMATE V7 ONLINE] 📂\nDEV: LEWI DOS SANTOS OLIVEIRA 👑\n\nNo Recoil e HS Pescoço integrados com sucesso.\nDigite seu Celular e as Armas 👇`;
        typeMessage(manifesto, "bot");
    }

    function typeMessage(text, type) {
        input.disabled = true; btnSend.disabled = true;
        let div = document.createElement('div');
        div.className = `bubble ${type}`;
        chat.appendChild(div);
        let i = 0;
        let interval = setInterval(() => {
            div.innerHTML += text.charAt(i); i++;
            chat.scrollTop = chat.scrollHeight;
            if (i >= text.length) {
                clearInterval(interval);
                input.disabled = false; btnSend.disabled = false;
                input.placeholder = "Modelo, Armas... 🔓";
                input.focus();
            }
        }, 5);
    }

    function sendMessage() {
        const val = input.value;
        if(!val.includes(',')) return;
        
        let uDiv = document.createElement('div'); uDiv.className="bubble user"; uDiv.innerText=val;
        chat.appendChild(uDiv); input.value="";

        setTimeout(() => {
            const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            let partes = val.split(',');
            let modelo = partes[0].trim().toUpperCase();
            let armasStr = partes.slice(1).join(',').replace(/\s+e\s+/gi, ',');
            let listaArmas = armasStr.split(',').map(a => a.trim().toUpperCase()).filter(a => a.length > 0);

            let g = r(195, 200); let rd = r(185, 196); let m2 = r(178, 192); let m4 = r(172, 188);

            let res = `⚠️ **CONFIGURAÇÃO V7 ULTIMATE** ⚠️\n\n[CELULAR]: ${modelo}\n[ARMAS]: ${listaArmas.join(' | ')}\n----------------------------------\n\n`;
            res += `🎯 **SENSIBILIDADE ÚNICA:**\n• Geral: ${g}\n• Red Dot: ${rd}\n• Mira 2x: ${m2}\n• Mira 4x: ${m4}\n\n`;

            let dpi;
            if (modelo.includes("G53")) { dpi = r(510, 580); } 
            else { dpi = r(620, 940); }
            
            res += `----------------------------------\n📱 DPI RECOMENDADA: ${dpi}\n🔘 BOTÃO: ${r(44, 55)}%\n\nStatus: **SABOR HACK ATIVADO!** 😈✅`;
            typeMessage(res, "bot");
        }, 1000);
    }

    function showTab(n) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
        ['tab-bot', 'tab-tool', 'tab-fps'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById('tab-' + n).classList.remove('hidden');
    }

    function execute(b, m) {
        let t = b.innerText; b.innerText="MODIFICANDO REGISTROS...";
        setTimeout(() => { b.innerText=m; setTimeout(() => b.innerText=t, 2500); }, 1500);
    }
</script>
</body>
</html>
